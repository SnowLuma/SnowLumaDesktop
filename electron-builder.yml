appId: org.snowluma.desktop
# productName drives: window title, NSIS shortcut name, executable file
# name (SnowLumaDesktop.exe), and what shows up in Task Manager's
# "Apps" column. Keep it as a single token (no space) so the .exe and
# Task Manager entry both read `SnowLumaDesktop`.
productName: SnowLumaDesktop
executableName: SnowLumaDesktop
copyright: SnowLuma Project
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
asarUnpack:
  - resources/**
win:
  # electron-builder auto-generates the .ico from this PNG (must be
  # ≥256×256). The 300×300 we copied from packages/webui/public/logo.png
  # qualifies.
  icon: build/icon.png
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  artifactName: ${productName}-${version}-${arch}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  artifactName: ${productName}-Setup-${version}.${ext}
  shortcutName: SnowLumaDesktop
  deleteAppDataOnUninstall: false
portable:
  artifactName: ${productName}-Portable-${version}.${ext}
publish:
  provider: github
  owner: SnowLuma
  repo: SnowLumaDesktop
