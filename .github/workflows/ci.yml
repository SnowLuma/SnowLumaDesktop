name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  # Opt in to Node 24 for JavaScript-based actions ahead of the
  # 2026-06 default flip — silences the deprecation banner.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [22]
    steps:
      - uses: actions/checkout@v4
      # pnpm version comes from package.json's `packageManager` field.
      # Passing `version:` here too triggers ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: 'Install (no-frozen-lockfile to tolerate local link: deps)'
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build (electron-vite only — packaging happens in release.yml)
        run: pnpm build
