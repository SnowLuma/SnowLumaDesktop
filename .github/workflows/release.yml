name: Release (stable)

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-publish:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main monorepo for @snowluma/ui
        uses: actions/checkout@v4
        with:
          repository: SnowLuma/SnowLuma
          ref: dev
          path: snowluma
      - name: Checkout Desktop
        uses: actions/checkout@v4
        with:
          path: snowluma/dev/SnowLumaDesktop

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            snowluma/pnpm-lock.yaml
            snowluma/dev/SnowLumaDesktop/pnpm-lock.yaml

      - name: 'Install main monorepo (root + packages/*)'
        working-directory: snowluma
        shell: bash
        run: pnpm install --no-frozen-lockfile

      - name: Build @snowluma/ui
        working-directory: snowluma/packages/ui
        shell: bash
        run: pnpm build

      - name: Install Desktop deps
        working-directory: snowluma/dev/SnowLumaDesktop
        shell: bash
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        working-directory: snowluma/dev/SnowLumaDesktop
        shell: bash
        run: pnpm typecheck

      - name: Build NSIS installer + portable zip
        working-directory: snowluma/dev/SnowLumaDesktop
        shell: bash
        run: pnpm pack:installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release artifacts
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          files: |
            snowluma/dev/SnowLumaDesktop/release/*.exe
            snowluma/dev/SnowLumaDesktop/release/*.zip
            snowluma/dev/SnowLumaDesktop/release/latest.yml
            snowluma/dev/SnowLumaDesktop/release/latest*.yml
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
